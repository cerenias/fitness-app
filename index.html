<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#2DD4BF">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="FitTrack">
  <link rel="apple-touch-icon" href="icons/icon.svg">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/style.css">
  <title>FitTrack</title>
</head>
<body>

<div id="app">
  <header class="app-header">
    <span class="header-logo">FitTrack</span>
  </header>

  <main id="main">
    <div class="view">
      <div class="empty-state">
        <div class="empty-icon">⏳</div>
        <div class="empty-text">Loading…</div>
      </div>
    </div>
  </main>

  <nav class="bottom-nav">
    <button class="nav-item active" data-route="home" onclick="location.hash='#home'">
      <span class="nav-icon">🏠</span>
      <span>Home</span>
    </button>
    <button class="nav-item" data-route="workout" onclick="location.hash='#workout'">
      <span class="nav-icon">💪</span>
      <span>Training</span>
    </button>
    <button class="nav-item" data-route="coach" onclick="location.hash='#coach'">
      <img src="icons/maya.svg" style="width:26px;height:26px;border-radius:50%;border:2px solid transparent" class="maya-nav-icon" alt="Maya">
      <span>Maya</span>
    </button>
    <button class="nav-item" data-route="progress" onclick="location.hash='#progress'">
      <span class="nav-icon">📈</span>
      <span>Progress</span>
    </button>
    <button class="nav-item" data-route="profile" onclick="location.hash='#profile'">
      <span class="nav-icon">👤</span>
      <span>Profile</span>
    </button>
  </nav>
</div>

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>

<!-- OneSignal (loaded only if App ID is configured) -->
<script>
  // Loaded conditionally after config is read in app.js → initNotifications()
  window.OneSignalDeferred = window.OneSignalDeferred || [];
</script>
<script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>

<!-- App -->
<script type="module" src="js/app.js"></script>

</body>
</html>
